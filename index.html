<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta charset="utf-8" />
<title>ChillZOne Login</title>
<link rel="stylesheet" href="globals.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="LOGIN">
<header class="rectangle">
<div class="text-wrapper">ChillZOne</div>
<nav aria-label="Primary">
<a href="#" class="div">Home</a>
<a href="#" class="text-wrapper-2">Spots</a>
<a href="#" class="text-wrapper-3">Review</a>
<a href="#" class="text-wrapper-4">Article</a>
</nav>
<a href="#" aria-label="User account">
<img class="user-icon" src="user icon 1.png" alt="User account icon" />
</a>
</header>
<main>
<section aria-labelledby="welcome-back-title">
<h1 class="text-wrapper-12" id="welcome-back-title">Welcome Back</h1>
<p class="p">Welcome back! Please enter your details.</p>
<form action="#" method="post" novalidate>
<label class="text-wrapper-5" for="email">Email</label>
<input class="rectangle-2" id="email" name="email" type="email" autocomplete="email" aria-label="Email" />
<label class="text-wrapper-6" for="password">Password</label>
<input class="rectangle-6" id="password" name="password" type="password" autocomplete="current-password" aria-label="Password" />
<button class="rectangle-4" type="submit" aria-label="Create Account">
<span class="text-wrapper-8">Create Account</span>
</button>
<button class="rectangle-5" type="button" aria-label="Sign In with Google">
<img class="image" src="google.png" alt="user account icon" />
<span class="text-wrapper-9">Sign In with Google</span>
</button>
<input class="rectangle-7" id="remember-me" name="remember-me" type="checkbox" aria-label="Remember me" />
<label class="text-wrapper-7" for="remember-me">Remember me</label>
<a class="text-wrapper-11" href="#">Forgot Password?</a>
<p class="don-t-have-an">
<span class="span">Don’t have an account? </span>
<a href="#" class="text-wrapper-10">Sign Up</a>
</p>
</form>
</section>
<img class="building" src="gambar 1.png" alt="Illustration of a building" />
</main>
<footer>
<p class="element-chillzone-all">© 2026 ChillZOne. All rights reserved.<br/>Create your vibe • Zone your moment • Own your experience</p>
</footer>
</div>
</body>
</html>
